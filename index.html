<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniPlanner PWA Ultra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0a',
                        darkCard: '#121212',
                        lightBg: '#f4f4f5',
                        lightCard: '#ffffff'
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .event-node {
            border-left-width: 3px;
            transition: all 0.15s ease;
        }

        @media (max-width: 640px) {
            .grid-cols-mobile {
                grid-template-columns: 35px repeat(6, 1fr);
            }
        }
        
        .header-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-lightBg text-zinc-900 dark:bg-darkBg dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const DIAS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const HORAS = Array.from({ length: 17 }, (_, i) => i + 6);

        const COLORS = [
            { name: 'Gris', class: 'bg-zinc-800 border-zinc-500' },
            { name: 'Indigo', class: 'bg-indigo-700 border-indigo-400' },
            { name: 'Azul', class: 'bg-blue-700 border-blue-400' },
            { name: 'Cian', class: 'bg-cyan-700 border-cyan-400' },
            { name: 'Rojo', class: 'bg-red-800 border-red-500' },
            { name: 'Púrpura', class: 'bg-purple-800 border-purple-500' }
        ];

        function App() {
            const [isDark, setIsDark] = useState(() => localStorage.getItem('uni_theme') !== 'light');
            const [events, setEvents] = useState(() => {
                const saved = localStorage.getItem('uni_events_v4');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const fileInputRef = useRef(null);

            const [newEvent, setNewEvent] = useState({ 
                nombre: '', dia: 'Lunes', inicio: 9, fin: 11, color: COLORS[1].class, aula: '' 
            });

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                localStorage.setItem('uni_theme', isDark ? 'dark' : 'light');
            }, [isDark]);

            useEffect(() => {
                localStorage.setItem('uni_events_v4', JSON.stringify(events));
            }, [events]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000); 
                return () => clearInterval(timer);
            }, []);

            const addEvent = () => {
                // Reparado: Validación más flexible y conversión forzada a número
                const hInicio = parseInt(newEvent.inicio);
                const hFin = parseInt(newEvent.fin);

                if (!newEvent.nombre.trim()) {
                    alert("Por favor, ingresa el nombre de la materia.");
                    return;
                }
                if (hInicio >= hFin) {
                    alert("La hora de inicio debe ser menor a la de fin.");
                    return;
                }

                const eventToSave = { 
                    ...newEvent, 
                    id: Date.now(),
                    inicio: hInicio,
                    fin: hFin
                };

                setEvents(prev => [...prev, eventToSave]);
                
                // Reset del formulario
                setNewEvent({ 
                    nombre: '', 
                    dia: newEvent.dia, 
                    inicio: 9, 
                    fin: 11, 
                    color: newEvent.color, 
                    aula: '' 
                });
                setShowAddModal(false);
            };

            const removeEvent = (id) => {
                setEvents(prev => prev.filter(e => e.id !== id));
            };

            const clearAllEvents = () => {
                if (window.confirm('¿ELIMINAR TODO? Esta acción no se puede deshacer.')) {
                    setEvents([]);
                    localStorage.removeItem('uni_events_v4');
                }
            };

            const copyPrompt = () => {
                const promptText = `Genera un archivo CSV para mi calendario siguiendo este formato exacto (sin espacios después de las comas):
Materia,Dia,Inicio,Fin,Color,Aula
"Analisis I","Lunes",9,11,"bg-indigo-700 border-indigo-400","Aula 302"

Días: Lunes, Martes, Miércoles, Jueves, Viernes, Sábado.
Colores: "bg-zinc-800 border-zinc-500", "bg-indigo-700 border-indigo-400", "bg-blue-700 border-blue-400", "bg-cyan-700 border-cyan-400", "bg-red-800 border-red-500", "bg-purple-800 border-purple-500".`;
                
                const textArea = document.createElement("textarea");
                textArea.value = promptText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("¡Prompt copiado!");
            };

            const exportICS = () => {
                let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//UniPlanner//ES\n";
                const diaMap = { 'Lunes': 'MO', 'Martes': 'TU', 'Miércoles': 'WE', 'Jueves': 'TH', 'Viernes': 'FR', 'Sábado': 'SA' };
                events.forEach(e => {
                    icsContent += "BEGIN:VEVENT\n";
                    icsContent += `SUMMARY:${e.nombre}\n`;
                    icsContent += `LOCATION:${e.aula || 'TBD'}\n`;
                    icsContent += `RRULE:FREQ=WEEKLY;BYDAY=${diaMap[e.dia]}\n`;
                    icsContent += `DTSTART:20250101T${e.inicio.toString().padStart(2, '0')}0000\n`;
                    icsContent += `DTEND:20250101T${e.fin.toString().padStart(2, '0')}0000\n`;
                    icsContent += "END:VEVENT\n";
                });
                icsContent += "END:VCALENDAR";
                const blob = new Blob([icsContent], { type: 'text/calendar' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "horario.ics";
                link.click();
            };

            const handleImportCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const text = e.target.result;
                        const lines = text.split('\n').filter(l => l.trim() !== '').slice(1);
                        const imported = lines.map(line => {
                            const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            if (parts.length < 5) return null;
                            return {
                                id: Math.random() * Date.now(),
                                nombre: parts[0].replace(/"/g, ''),
                                dia: parts[1].replace(/"/g, ''),
                                inicio: parseInt(parts[2]),
                                fin: parseInt(parts[3]),
                                color: parts[4].replace(/"/g, ''),
                                aula: parts[5] ? parts[5].replace(/"/g, '') : ''
                            };
                        }).filter(Boolean);
                        setEvents(prev => [...prev, ...imported]);
                    } catch (err) { alert("Error en el formato del CSV"); }
                };
                reader.readAsText(file);
            };

            const nextClass = useMemo(() => {
                const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const todayName = dayNames[currentTime.getDay()];
                const currentHour = currentTime.getHours();
                return events
                    .filter(e => e.dia === todayName && e.inicio > currentHour)
                    .sort((a, b) => a.inicio - b.inicio)[0];
            }, [events, currentTime]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 px-4 py-3 border-b border-zinc-200 dark:border-zinc-800 header-blur bg-white/70 dark:bg-black/70 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-black dark:bg-white p-1 rounded-sm">
                                <Icon name="grid" className="text-white dark:text-black" size={14} />
                            </div>
                            <h1 className="font-black text-xs uppercase tracking-tighter">PLANNER <span className="text-zinc-400 italic">PRO</span></h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsDark(!isDark)} className="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-full transition-colors">
                                <Icon name={isDark ? "sun" : "moon"} size={16} />
                            </button>
                            <button onClick={() => setShowAddModal(true)} className="bg-black dark:bg-white text-white dark:text-black px-4 py-1.5 font-bold text-[10px] uppercase tracking-widest hover:opacity-80 active:scale-95 transition-all">
                                + CLASE
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto w-full max-w-7xl mx-auto p-3 md:p-6 space-y-4">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4">
                            <div className="col-span-2 md:col-span-3 p-4 border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 flex flex-col justify-center min-h-[80px]">
                                {nextClass ? (
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-[8px] font-bold uppercase text-zinc-400 mb-1 tracking-widest">Siguiente</p>
                                            <h2 className="text-lg md:text-xl font-black uppercase tracking-tighter truncate max-w-[200px]">{nextClass.nombre}</h2>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-mono text-zinc-500">{nextClass.inicio}:00 hs</div>
                                            <div className="text-[9px] font-bold text-zinc-400 uppercase">@{nextClass.aula || 'TBD'}</div>
                                        </div>
                                    </div>
                                ) : (
                                    <p className="text-[9px] uppercase font-bold text-zinc-400 tracking-widest">No hay más clases hoy</p>
                                )}
                            </div>
                            <div className="col-span-2 md:col-span-1 p-4 border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950">
                                <p className="text-[8px] font-bold uppercase text-zinc-400 mb-1 tracking-widest">Total Semanal</p>
                                <h3 className="text-xl md:text-2xl font-black italic">
                                    {events.reduce((acc, curr) => acc + (curr.fin - curr.inicio), 0)} 
                                    <span className="text-[9px] opacity-40 ml-1">HORAS</span>
                                </h3>
                            </div>
                        </div>

                        <div className="flex overflow-x-auto gap-2 no-scrollbar py-1">
                            <input type="file" accept=".csv" ref={fileInputRef} onChange={handleImportCSV} className="hidden" />
                            <button onClick={() => setShowImportModal(true)} className="flex-none flex items-center gap-1.5 px-3 py-1.5 border border-zinc-200 dark:border-zinc-800 text-[9px] font-bold uppercase hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors bg-white dark:bg-transparent">
                                <Icon name="upload" size={12} /> Importar
                            </button>
                            <button onClick={exportICS} className="flex-none flex items-center gap-1.5 px-3 py-1.5 border border-zinc-200 dark:border-zinc-800 text-[9px] font-bold uppercase hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors bg-white dark:bg-transparent">
                                <Icon name="calendar" size={12} /> Exportar .ICS
                            </button>
                            <button onClick={clearAllEvents} className="flex-none flex items-center gap-1.5 px-3 py-1.5 border border-red-200 dark:border-red-900/30 text-[9px] font-bold uppercase text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors bg-white dark:bg-transparent ml-auto">
                                <Icon name="trash-2" size={12} /> Limpiar Todo
                            </button>
                        </div>

                        <div className="border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-black overflow-hidden shadow-sm">
                            <div className="w-full">
                                <div className="grid grid-cols-7 grid-cols-mobile border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/40">
                                    <div className="h-10 border-r border-zinc-200 dark:border-zinc-800/30 flex items-center justify-center">
                                        <Icon name="clock" size={10} className="text-zinc-400" />
                                    </div>
                                    {DIAS.map(dia => (
                                        <div key={dia} className="h-10 flex items-center justify-center text-[8px] md:text-[10px] font-black uppercase border-l border-zinc-200/50 dark:border-zinc-800/10 text-zinc-500 italic">
                                            {dia.substring(0, 3)}
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="relative">
                                    {HORAS.map(hora => (
                                        <div key={hora} className="grid grid-cols-7 grid-cols-mobile border-b border-zinc-100 dark:border-zinc-900 h-14 md:h-20">
                                            <div className="text-[8px] font-mono text-center flex items-center justify-center opacity-40 border-r border-zinc-200/30 bg-zinc-50 dark:bg-zinc-950/40">
                                                {hora}
                                            </div>
                                            {DIAS.map(dia => {
                                                const startEvent = events.find(e => e.dia === dia && e.inicio === hora);
                                                return (
                                                    <div key={dia} className="relative border-l border-zinc-200 dark:border-zinc-800/5">
                                                        {startEvent && (
                                                            <div 
                                                                className={`absolute inset-x-0 z-10 p-1 md:p-2 flex flex-col justify-between border-b border-r ${startEvent.color} text-white event-node shadow-md group overflow-hidden`}
                                                                style={{ 
                                                                    top: '0', 
                                                                    height: `calc(${(startEvent.fin - startEvent.inicio) * (window.innerWidth < 640 ? 3.5 : 5)}rem)`,
                                                                    zIndex: 20
                                                                }}
                                                            >
                                                                <div className="pointer-events-none">
                                                                    <div className="font-black uppercase text-[7px] md:text-[10px] leading-tight mb-0.5">{startEvent.nombre}</div>
                                                                    <div className="text-[6px] opacity-80">{startEvent.aula}</div>
                                                                </div>
                                                                <button onClick={(e) => { e.stopPropagation(); removeEvent(startEvent.id); }} className="absolute top-0 right-0 p-1 bg-black/20 hover:bg-black/40 transition-all opacity-0 group-hover:opacity-100">
                                                                    <Icon name="x" size={10} />
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Modal Añadir */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
                            <div className="relative w-full max-w-sm p-6 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xs font-black uppercase tracking-[0.2em] italic">NUEVA CLASE</h2>
                                    <button onClick={() => setShowAddModal(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="space-y-4">
                                    <input placeholder="MATERIA (Ej: Análisis I)" className="w-full p-3 bg-zinc-50 dark:bg-black border border-zinc-200 dark:border-zinc-800 text-xs font-bold uppercase outline-none" value={newEvent.nombre} onChange={e => setNewEvent({...newEvent, nombre: e.target.value})}/>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="space-y-1">
                                            <p className="text-[8px] font-bold text-zinc-400">DÍA</p>
                                            <select className="w-full p-3 bg-zinc-50 dark:bg-black border border-zinc-200 dark:border-zinc-800 text-[10px] font-bold uppercase" value={newEvent.dia} onChange={e => setNewEvent({...newEvent, dia: e.target.value})}>
                                                {DIAS.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[8px] font-bold text-zinc-400">AULA</p>
                                            <input placeholder="OPCIONAL" className="w-full p-3 bg-zinc-50 dark:bg-black border border-zinc-200 dark:border-zinc-800 text-[10px] uppercase" value={newEvent.aula} onChange={e => setNewEvent({...newEvent, aula: e.target.value})}/>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="space-y-1">
                                            <p className="text-[8px] font-bold text-zinc-400">INICIO (HS)</p>
                                            <input type="number" min="6" max="22" className="w-full p-3 bg-zinc-50 dark:bg-black border border-zinc-200 dark:border-zinc-800 text-xs" value={newEvent.inicio} onChange={e => setNewEvent({...newEvent, inicio: e.target.value})}/>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[8px] font-bold text-zinc-400">FIN (HS)</p>
                                            <input type="number" min="7" max="23" className="w-full p-3 bg-zinc-50 dark:bg-black border border-zinc-200 dark:border-zinc-800 text-xs" value={newEvent.fin} onChange={e => setNewEvent({...newEvent, fin: e.target.value})}/>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <p className="text-[8px] font-bold text-zinc-400 uppercase">Color de etiqueta</p>
                                        <div className="flex gap-2 py-2 overflow-x-auto no-scrollbar">
                                            {COLORS.map(c => (
                                                <button key={c.class} onClick={() => setNewEvent({...newEvent, color: c.class})} className={`w-8 h-8 shrink-0 rounded-full ${c.class} border-2 ${newEvent.color === c.class ? 'border-zinc-400 dark:border-white scale-110' : 'border-transparent'} transition-transform`} />
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={addEvent} className="w-full bg-black dark:bg-white text-white dark:text-black py-4 font-black text-[10px] uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all">
                                        AÑADIR A MI HORARIO
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Importar */}
                    {showImportModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
                            <div className="relative w-full max-w-md p-6 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 shadow-2xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.2em] italic">GUÍA DE IMPORTACIÓN</h2>
                                    <button onClick={() => setShowImportModal(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="p-3 bg-zinc-100 dark:bg-black border border-zinc-200 dark:border-zinc-800">
                                        <p className="text-[9px] font-bold text-zinc-400 uppercase mb-2">Formato de Columnas:</p>
                                        <code className="text-[10px] font-mono text-indigo-500 dark:text-indigo-400 block break-all">
                                            Materia,Dia,Inicio,Fin,Color,Aula
                                        </code>
                                    </div>
                                    <button onClick={copyPrompt} className="w-full flex items-center justify-center gap-2 p-3 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors font-bold uppercase text-[9px] tracking-widest">
                                        <Icon name="copy" size={14}/> Copiar Prompt IA
                                    </button>
                                    <button onClick={() => { setShowImportModal(false); fileInputRef.current.click(); }} className="w-full bg-black dark:bg-white text-white dark:text-black p-4 font-black uppercase text-[10px] tracking-widest">
                                        IMPORTAR ARCHIVO .CSV
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

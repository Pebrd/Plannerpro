<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniPlanner - Full View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #09090b; color: #fafafa; }
        
        /* Grid responsivo: ocupa el 100% del ancho sin scroll horizontal */
        .grid-cols-custom { 
            display: grid;
            grid-template-columns: 40px repeat(6, 1fr); 
        }
        
        @media (min-width: 768px) {
            .grid-cols-custom { 
                grid-template-columns: 60px repeat(6, 1fr); 
            }
        }

        .hour-row { height: 80px; position: relative; }
        @media (min-width: 768px) { .hour-row { height: 100px; } }

        .drag-over { background-color: rgba(59, 130, 246, 0.1); }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        * { border-radius: 0px !important; }
        .event-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-left-width: 3px; }
        @media (min-width: 768px) { .event-card { border-left-width: 4px; } }
        
        .event-hidden { opacity: 0.15; filter: grayscale(1) blur(1px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        .calendar-container {
            width: 100%;
            overflow-x: hidden; /* Forzamos a que no haya scroll horizontal */
        }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const DIAS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const DIA_MAP_ICS = { 'Lunes': 'MO', 'Martes': 'TU', 'Miércoles': 'WE', 'Jueves': 'TH', 'Viernes': 'FR', 'Sábado': 'SA' };
        const HORA_INICIO = 7;
        const HORA_FIN = 23;
        const HORAS = Array.from({ length: HORA_FIN - HORA_INICIO + 1 }, (_, i) => i + HORA_INICIO);

        const COLORS = [
            { id: 'blue', bg: 'bg-blue-600', border: 'border-blue-800' },
            { id: 'indigo', bg: 'bg-indigo-600', border: 'border-indigo-800' },
            { id: 'purple', bg: 'bg-purple-600', border: 'border-purple-800' },
            { id: 'emerald', bg: 'bg-emerald-600', border: 'border-emerald-800' },
            { id: 'rose', bg: 'bg-rose-600', border: 'border-rose-800' },
            { id: 'amber', bg: 'bg-amber-600', border: 'border-amber-800' }
        ];

        const timeToMinutes = (t) => {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (m) => {
            const h = Math.floor(m / 60);
            const min = m % 60;
            return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
        };

        function App() {
            const [events, setEvents] = useState(() => {
                const saved = localStorage.getItem('uni_planner_v12');
                return saved ? JSON.parse(saved) : [];
            });
            const [showModal, setShowModal] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [draggedEvent, setDraggedEvent] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);
            const fileInputRef = useRef(null);
            
            const [form, setForm] = useState({
                nombre: '', dias: ['Lunes'], inicio: '09:00', fin: '11:00', color: 'blue', aula: '', visible: true, groupToken: null
            });

            useEffect(() => {
                localStorage.setItem('uni_planner_v12', JSON.stringify(events));
            }, [events]);

            const clearAll = () => {
                if(window.confirm("¿Deseas eliminar todas las materias?")) setEvents([]);
            };

            const toggleVisibility = (groupToken, e) => {
                e.stopPropagation();
                setEvents(prev => prev.map(ev => 
                    ev.groupToken === groupToken ? { ...ev, visible: !ev.visible } : ev
                ));
            };

            const exportToICS = () => {
                if (events.length === 0) return;
                let icsContent = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//UniPlanner//Schedule//ES", "CALSCALE:GREGORIAN", "METHOD:PUBLISH"];
                events.filter(e => e.visible).forEach(event => {
                    const startStr = event.inicio.replace(':', '') + "00";
                    const endStr = event.fin.replace(':', '') + "00";
                    const dayCode = DIA_MAP_ICS[event.dia];
                    icsContent.push("BEGIN:VEVENT", `SUMMARY:${event.nombre}`, `LOCATION:${event.aula || 'Sin aula'}`, `DTSTART;20240101T${startStr}`, `DTEND;20240101T${endStr}`, `RRULE:FREQ=WEEKLY;BYDAY=${dayCode}`, "END:VEVENT");
                });
                icsContent.push("END:VCALENDAR");
                const blob = new Blob([icsContent.join("\r\n")], { type: 'text/calendar;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "mi_horario.ics";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleCSVImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const lines = content.split('\n');
                    const newEvents = [];
                    lines.forEach((line, index) => {
                        const parts = line.split(',').map(p => p.trim());
                        if (parts.length >= 4) {
                            const [nombre, diasRaw, inicio, fin, color, aula] = parts;
                            const diasDetectados = diasRaw.split(/[\-\/\s]+/).map(d => {
                                return d.charAt(0).toUpperCase() + d.slice(1).toLowerCase().trim();
                            }).filter(d => DIAS.includes(d));

                            if (diasDetectados.length > 0) {
                                const groupToken = `csv-${Date.now()}-${index}`;
                                diasDetectados.forEach((dia, dIdx) => {
                                    newEvents.push({ 
                                        id: `${groupToken}-${dIdx}`, 
                                        nombre, 
                                        dia, 
                                        inicio, 
                                        fin, 
                                        color: color || 'blue', 
                                        aula: aula || '', 
                                        visible: true, 
                                        groupToken 
                                    });
                                });
                            }
                        }
                    });
                    if (newEvents.length > 0) setEvents(prev => [...prev, ...newEvents]);
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const copyPrompt = () => {
                const prompt = `Actúa como un experto organizador académico... [FORMATO CSV]`;
                const textArea = document.createElement("textarea");
                textArea.value = prompt;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleSave = () => {
                if (!form.nombre || form.dias.length === 0) return;
                const groupToken = editingId ? events.find(e => e.id === editingId).groupToken : Date.now().toString();

                if (editingId) {
                    const baseVisible = events.find(e => e.groupToken === groupToken)?.visible ?? true;
                    const newEntries = form.dias.map((d, i) => ({
                        ...form,
                        id: `${groupToken}-${i}`,
                        dia: d,
                        groupToken,
                        visible: baseVisible
                    }));
                    setEvents([...events.filter(e => e.groupToken !== groupToken), ...newEntries]);
                } else {
                    const newEntries = form.dias.map((d, i) => ({
                        ...form,
                        id: `${groupToken}-${i}`,
                        dia: d,
                        groupToken,
                        visible: true
                    }));
                    setEvents([...events, ...newEntries]);
                }
                closeModal();
            };

            const openEdit = (event) => {
                const groupEvents = events.filter(e => e.groupToken === event.groupToken);
                setForm({ ...event, dias: groupEvents.map(e => e.dia) });
                setEditingId(event.id);
                setShowModal(true);
            };

            const closeModal = () => {
                setShowModal(false);
                setEditingId(null);
                setForm({ nombre: '', dias: ['Lunes'], inicio: '09:00', fin: '11:00', color: 'blue', aula: '', visible: true, groupToken: null });
            };

            const onDrop = (e, day, hour) => {
                e.preventDefault();
                if (!draggedEvent) return;
                const duration = timeToMinutes(draggedEvent.fin) - timeToMinutes(draggedEvent.inicio);
                const newStartMin = hour * 60;
                setEvents(events.map(ev => 
                    ev.id === draggedEvent.id 
                        ? { ...ev, dia: day, inicio: minutesToTime(newStartMin), fin: minutesToTime(newStartMin + duration) } 
                        : ev
                ));
                setDraggedEvent(null);
            };

            const getLayoutStyles = (event, dayEvents) => {
                const start = timeToMinutes(event.inicio);
                const end = timeToMinutes(event.fin);
                const overlapping = dayEvents.filter(other => {
                    const oStart = timeToMinutes(other.inicio);
                    const oEnd = timeToMinutes(other.fin);
                    return (start < oEnd && end > oStart);
                }).sort((a, b) => timeToMinutes(a.inicio) - timeToMinutes(b.inicio));
                const width = 100 / (overlapping.length || 1);
                const index = overlapping.findIndex(o => o.id === event.id);
                
                const hourHeight = window.innerWidth < 768 ? 80 : 100;

                return {
                    width: `${width}%`,
                    left: `${index * width}%`,
                    top: `${(start % 60 / 60) * 100}%`,
                    height: `${((end - start) / 60) * hourHeight}px`
                };
            };

            return (
                <div className="flex flex-col h-screen bg-zinc-950 text-zinc-100">
                    <header className="h-14 md:h-20 border-b border-zinc-800 flex items-center justify-between px-3 md:px-6 bg-zinc-900/50 backdrop-blur-xl shrink-0 z-40">
                        <div className="flex items-center gap-2 md:gap-6 overflow-hidden">
                            <h1 className="text-sm md:text-xl font-black italic tracking-tighter text-blue-500 uppercase shrink-0">UniPlanner</h1>
                            <div className="flex gap-0.5 border-l border-zinc-800 ml-1 md:ml-4 pl-1 md:pl-4 items-center">
                                <button onClick={exportToICS} title="Exportar .ICS" className="p-1.5 hover:bg-zinc-800 text-zinc-400 transition-colors">
                                    <Icon name="calendar" size={14}/>
                                </button>
                                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleCSVImport} />
                                <button onClick={() => fileInputRef.current.click()} title="Importar .CSV" className="p-1.5 hover:bg-zinc-800 text-zinc-400 transition-colors">
                                    <Icon name="file-up" size={14}/>
                                </button>
                                <button onClick={() => setShowHelp(!showHelp)} className={`p-1.5 transition-colors ${showHelp ? 'text-blue-500' : 'text-zinc-600 hover:text-zinc-400'}`}>
                                    <Icon name="info" size={14}/>
                                </button>
                            </div>
                        </div>
                        <button onClick={() => setShowModal(true)} className="bg-blue-600 hover:bg-blue-500 px-3 md:px-6 py-1.5 md:py-2 font-bold text-[9px] md:text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-900/20 shrink-0">
                            + <span className="hidden sm:inline">Clase</span>
                        </button>
                    </header>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden p-0 md:p-8 hide-scrollbar calendar-container">
                        {showHelp && (
                            <div className="m-2 md:m-0 mb-4 md:mb-6 bg-blue-950/20 border border-blue-900/50 p-4 md:p-6 animate-fade-in relative">
                                <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 text-zinc-500 hover:text-white"><Icon name="x" size={16}/></button>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-blue-400 mb-2">Formato CSV</h3>
                                        <code className="block bg-black p-2 text-[8px] md:text-[10px] font-mono text-zinc-400 border border-zinc-800">
                                            Materia, Lunes-Viernes, 08:00, 10:00, color, Aula 1
                                        </code>
                                    </div>
                                    <button onClick={copyPrompt} className={`px-4 py-2 text-[9px] font-black uppercase transition-all ${copySuccess ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                        {copySuccess ? 'Copiado' : 'Copiar Prompt IA'}
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="w-full border-x border-zinc-800 bg-zinc-900/30">
                            <div className="grid grid-cols-custom border-b border-zinc-800 bg-zinc-900/50 sticky top-0 z-30">
                                <div className="p-2 border-r border-zinc-800 bg-zinc-900"></div>
                                {DIAS.map(d => (
                                    <div key={d} className="p-1 md:p-4 text-center text-[7px] md:text-[10px] font-black uppercase tracking-tight md:tracking-[0.2em] text-zinc-500 bg-zinc-900/80 backdrop-blur-md">
                                        <span className="md:hidden">{d.substring(0, 2)}</span>
                                        <span className="hidden md:inline">{d}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="relative">
                                {HORAS.map(h => (
                                    <div key={h} className="grid grid-cols-custom hour-row border-b border-zinc-800/30">
                                        <div className="flex justify-center pt-1 text-[7px] md:text-[10px] font-mono font-bold text-zinc-600 border-r border-zinc-800/50">
                                            {String(h).padStart(2, '0')}
                                        </div>
                                        {DIAS.map(d => {
                                            const dayEvents = events.filter(ev => ev.dia === d);
                                            return (
                                                <div key={d} className="relative border-r border-zinc-800/20" 
                                                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }} 
                                                    onDrop={(e) => { e.currentTarget.classList.remove('drag-over'); onDrop(e, d, h); }}>
                                                    {dayEvents.filter(ev => Math.floor(timeToMinutes(ev.inicio)/60) === h).map(event => {
                                                        const color = COLORS.find(c => c.id === event.color) || COLORS[0];
                                                        const layout = getLayoutStyles(event, dayEvents);
                                                        return (
                                                            <div key={event.id} draggable onDragStart={() => setDraggedEvent(event)} 
                                                                onClick={() => { if(window.innerWidth < 768) openEdit(event) }}
                                                                onDoubleClick={() => openEdit(event)} 
                                                                className={`absolute z-10 event-card p-0.5 md:p-3 cursor-pointer border-l-2 md:border-l-4 shadow-xl ${color.bg} ${color.border} ${!event.visible ? 'event-hidden' : ''}`} 
                                                                style={{ ...layout, zIndex: event.visible ? 10 : 5 }}>
                                                                <div className="flex flex-col h-full relative overflow-hidden">
                                                                    <div className="pr-1">
                                                                        <h4 className="font-black text-[6px] md:text-[11px] leading-none uppercase truncate">{event.nombre}</h4>
                                                                        <p className="text-[5px] md:text-[9px] font-bold opacity-80 md:mt-1">{event.inicio}</p>
                                                                    </div>
                                                                    <div className="mt-auto hidden md:flex items-center gap-1 text-[8px] font-bold opacity-70 border-t border-white/10">
                                                                        <Icon name="map-pin" size={9}/> <span className="truncate">{event.aula || 'S/A'}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-4 bg-black/90 backdrop-blur-sm">
                            <div className="bg-zinc-900 w-full max-w-sm p-6 border-t md:border border-zinc-800 shadow-2xl animate-fade-in">
                                <h3 className="text-base font-black italic mb-4 uppercase tracking-tighter">Detalles Materia</h3>
                                <div className="space-y-4">
                                    <input placeholder="Nombre" className="w-full bg-zinc-950 border border-zinc-800 p-3 font-bold text-sm outline-none focus:border-blue-500" value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                                    <div>
                                        <p className="text-[8px] font-black text-zinc-500 mb-2 uppercase tracking-widest">Días</p>
                                        <div className="flex gap-1 overflow-x-auto pb-1 hide-scrollbar">
                                            {DIAS.map(d => (
                                                <button key={d} onClick={() => {
                                                    const current = form.dias;
                                                    setForm({...form, dias: current.includes(d) ? (current.length > 1 ? current.filter(x => x !== d) : current) : [...current, d]});
                                                }} className={`min-w-[36px] h-9 border text-[9px] font-black shrink-0 ${form.dias.includes(d) ? 'bg-blue-600 border-blue-400' : 'bg-zinc-950 border-zinc-800 text-zinc-600'}`}>{d.substring(0, 2)}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="time" className="w-full bg-zinc-950 border border-zinc-800 p-2 font-bold text-xs" value={form.inicio} onChange={e => setForm({...form, inicio: e.target.value})} />
                                        <input type="time" className="w-full bg-zinc-950 border border-zinc-800 p-2 font-bold text-xs" value={form.fin} onChange={e => setForm({...form, fin: e.target.value})} />
                                    </div>
                                    <input placeholder="Aula (opcional)" className="w-full bg-zinc-950 border border-zinc-800 p-3 font-bold text-sm outline-none" value={form.aula} onChange={e => setForm({...form, aula: e.target.value})} />
                                    <div className="flex justify-between gap-1">
                                        {COLORS.map(c => (
                                            <button key={c.id} onClick={() => setForm({...form, color: c.id})} className={`w-6 h-6 ${c.bg} ${form.color === c.id ? 'ring-2 ring-white ring-offset-2 ring-offset-zinc-900' : 'opacity-30'}`} />
                                        ))}
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        {editingId && (
                                            <button onClick={() => { 
                                                const groupToken = events.find(e => e.id === editingId).groupToken;
                                                setEvents(events.filter(e => e.groupToken !== groupToken)); 
                                                closeModal(); 
                                            }} className="p-3 bg-zinc-800 text-rose-500"><Icon name="trash-2" /></button>
                                        )}
                                        <button onClick={handleSave} className="flex-1 bg-blue-600 p-3 font-black text-[10px] uppercase tracking-widest">{editingId ? 'Guardar' : 'Crear'}</button>
                                    </div>
                                    <button onClick={closeModal} className="w-full py-2 text-[9px] font-black text-zinc-600 uppercase">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
